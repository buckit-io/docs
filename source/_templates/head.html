<!-- Theme init: default to dark (matches buckit.io); applied before paint to avoid FOUC -->
<script>
   (function () {
      try {
         if (localStorage.getItem("dark-mode") !== "false") {
            document.documentElement.classList.add("dark-mode");
         }
      } catch (e) {
         document.documentElement.classList.add("dark-mode");
      }
   })();
</script>
